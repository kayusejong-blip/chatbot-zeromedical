<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 캐시 방지 정책 (v1.0) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CS Admin UI Prototype</title>
    <link rel="stylesheet" href="style.css?v=3.3">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <div class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <h1>휠체어 CS 센터</h1>
                    <span class="version">v3.6</span>
                </div>
                <div class="status">
                    <span class="dot"></span>
                    <span>온라인</span>
                </div>
            </header>
            <main class="chat-messages" id="chat-messages">
                <!-- Messages will be generated here -->
            </main>
            <footer class="chat-input-area">
                <div class="chat-input-area" id="options-container" style="border-bottom: none;">
            <!-- Options (Buttons) will be rendered here dynamically -->
        </div>

        <!-- Free Text Input Area -->
        <div class="chat-text-area" style="padding: 15px 24px; border-top: 1px solid #f3f4f6; display: flex; gap: 10px; background: white; z-index: 10;">
            <input type="text" id="user-free-text" placeholder="직접 문의사항을 입력해 보세요..." style="flex: 1; padding: 12px 16px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s;" onkeypress="if(event.key==='Enter') sendUserText()">
            <button onclick="sendUserText()" style="padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">전송</button>
        </div>
    </div>
    
    <!-- Update Log Section -->
                <input type="file" id="media-upload" accept="image/*,video/*" style="display:none;" onchange="handleFileUpload(event)">
            </footer>
        </div>
    </div>
    <!-- Firebase SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="firebase-config.js?v=3.6"></script>
    
    <script src="data.js?v=3.6"></script>
    <script src="script.js?v=3.6"></script>
</body>
</html>
