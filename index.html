<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <!-- 캐시 방지 정책 (v1.0) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>통합 고객지원센터</title>
    <link rel="stylesheet" href="style.css?v=4.13">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <div class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <h1>통합 고객지원센터</h1>
                    <span class="version">v4.13</span>
                </div>
                <div class="status">
                    <span class="dot"></span>
                    <span>온라인</span>
                </div>
            </header>
            
            <main class="chat-messages" id="chat-messages">
                <!-- Messages will be generated here -->
            </main>
            
            <footer class="chat-footer">
                <div class="options-area" id="options-container">
                    <!-- Options (Buttons) will be rendered here dynamically -->
                </div>

                <!-- Free Text Input Area -->
                <div class="input-area">
                    <button class="attach-btn" onclick="document.getElementById('media-upload').click()" title="사진/영상 첨부">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </button>
                    <textarea id="user-free-text" rows="1" placeholder="문의사항을 입력해 주세요..." onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendUserText(); }" oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 100) + 'px'"></textarea>
                    <button class="send-btn" onclick="sendUserText()">전송</button>
                    <!-- Hidden file input for Photo/Video upload -->
                    <input type="file" id="media-upload" accept="image/*,video/*" style="display:none;" onchange="handleFileUpload(event)">
                </div>
            </footer>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="firebase-config.js?v=4.13"></script>
    <script src="data.js?v=4.13"></script>
    <script src="script.js?v=4.13"></script>
</body>
</html>
